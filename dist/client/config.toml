[loading]
# Preset do preload de entrada no mundo:
# - "low"    -> loading menor, mais streaming depois
# - "medium" -> equilibrado (padrao recomendado)
# - "high"   -> loading maior, mundo mais pronto ao entrar
preset = "high"

[render.character_readability]
# Etapa D (Fase 2): tuning de legibilidade para player/NPC no slice.
# Esses knobs sao aplicados somente em personagens (nao no cenario).
shadow_lift  = 0.30
rim_strength = 0.18
rim_exponent = 2.40
min_ndotl    = 0.10
ambient_boost = 0.12

[render.scene_look]
# Controle global do look da cena (cenario/mundo).
# ibl_intensity: intensidade da luz indireta do HDR (irradiance + specular IBL).
# sky_intensity: intensidade visual do skybox (nao muda probes de IBL).
# world_shadow_lift: levanta sombras do cenario para evitar preto esmagado.
# direct_scale / ambient_scale: balanco entre sol duro e preenchimento do mundo.
# flat_ambient: preenchimento neutro independente do HDR, bom para faces longe do sol.
# world_min_ndotl: piso de luz solar para objetos do mundo, evitando faces 100% pretas.
# albedo_min_luma / albedo_lift_strength: calibra assets legados escuros sem clarear tudo.
# specular_scale: reduz highlights agressivos de materiais PBR legados/parciais.
# exposure_factor: exposicao global antes do tonemap.
# sun_intensity: intensidade da cor do sol por area.
ibl_intensity = 1.00
sky_intensity = 1.16
world_shadow_lift = 0.10
direct_scale = 1.32
ambient_scale = 0.88
flat_ambient = 0.03
world_min_ndotl = 0.05
albedo_min_luma = 0.18
albedo_lift_strength = 0.00
specular_scale = 0.88
exposure_factor = 1.10
sun_intensity = 1.36

[render.color]
# Color grading global pos-tonemap.
# Aumenta vida/contraste sem quebrar o PBR.
contrast = 1.08
saturation = 1.08
vibrance = 0.20
black_point = 0.010
vignette_strength = 0.04
vignette_softness = 0.55
